# Morning Grind — Netlify config
# Static site + one serverless function (the AI workout generator).

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Friendly alias: /api/workout -> the function (the app also calls the raw path directly).
[[redirects]]
  from = "/api/workout"
  to = "/.netlify/functions/workout"
  status = 200
