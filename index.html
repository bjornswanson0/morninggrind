<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0d14" />
  <title>Morning Grind</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="css/styles.css?v=41" />
  <script>try{if(localStorage.getItem('mg_theme')==='light'){document.documentElement.setAttribute('data-theme','light');var m=document.querySelector('meta[name=theme-color]');if(m)m.setAttribute('content','#eef2f9');}}catch(e){}</script>
</head>
<body>
  <header class="app-header">
    <img class="hdr-logo" src="icons/icon.svg?v=41" alt="Morning Grind" />
    <div style="flex:1; min-width:0">
      <div class="hdr-date" id="hdrDate">MORNING GRIND</div>
      <div class="hdr-title" id="hdrTitle">Morning Grind</div>
    </div>
    <button class="hdr-btn" id="themeToggle" aria-label="Toggle light or dark mode" onclick="toggleTheme()">🌙</button>
    <div class="hdr-streak" id="hdrStreak">🔥 0</div>
  </header>

  <main id="view" class="view"><!-- rendered by app.js --></main>

  <nav class="tabbar">
    <button class="tab active" data-tab="today">🏋️<span>Today</span></button>
    <button class="tab" data-tab="feed">👥<span>Feed</span></button>
    <button class="tab" data-tab="progress">📊<span>Progress</span></button>
  </nav>

  <!-- Rest timer overlay -->
  <div id="restTimer" class="rest-timer hidden">
    <div class="rest-count" id="restCount">1:30</div>
    <div class="rest-actions">
      <button data-rest="60">60s</button>
      <button data-rest="90">90s</button>
      <button data-rest="120">2m</button>
      <button id="restStop" class="rest-stop">✕</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=41"></script>
  <script src="js/data.js?v=41"></script>
  <script src="js/app.js?v=41"></script>
  <script src="js/sync.js?v=41"></script>
</body>
</html>
