<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#efeae0" />
  <title>Morning Grind</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="css/styles.css?v=45" />
  <script>try{if(localStorage.getItem('mg_theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');var m=document.querySelector('meta[name=theme-color]');if(m)m.setAttribute('content','#121d33');}}catch(e){}</script>
</head>
<body>
  <header class="app-header">
    <img class="hdr-logo" src="icons/icon.svg?v=45" alt="Morning Grind" />
    <div style="flex:1; min-width:0">
      <div class="hdr-date" id="hdrDate">MORNING GRIND</div>
      <div class="hdr-title" id="hdrTitle">Morning Grind</div>
    </div>
    <button class="hdr-btn" id="themeToggle" aria-label="Toggle light or dark mode" onclick="toggleTheme()"><svg class="ico" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></button>
    <div class="hdr-streak" id="hdrStreak"><svg class="ico" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg> 0</div>
  </header>

  <main id="view" class="view"><!-- rendered by app.js --></main>

  <nav class="tabbar">
    <button class="tab active" data-tab="today"><svg class="ico" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M14.4 14.4 9.6 9.6"/><path d="M18.657 21.485a2 2 0 1 1-2.829-2.828l-1.767 1.768a2 2 0 1 1-2.829-2.829l6.364-6.364a2 2 0 1 1 2.829 2.829l-1.768 1.767a2 2 0 1 1 2.828 2.829z"/><path d="m21.5 21.5-1.4-1.4"/><path d="M3.9 3.9 2.5 2.5"/><path d="M6.404 12.768a2 2 0 1 1-2.829-2.829l1.768-1.767a2 2 0 1 1-2.828-2.829l2.828-2.828a2 2 0 1 1 2.829 2.828l1.767-1.768a2 2 0 1 1 2.829 2.829z"/></svg><span>Today</span></button>
    <button class="tab" data-tab="feed"><svg class="ico" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Feed</span></button>
    <button class="tab" data-tab="progress"><svg class="ico" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><rect x="7" y="12" width="3" height="6" rx="1"/><rect x="12" y="8" width="3" height="10" rx="1"/><rect x="17" y="4" width="3" height="14" rx="1"/></svg><span>Progress</span></button>
  </nav>

  <!-- Rest timer overlay -->
  <div id="restTimer" class="rest-timer hidden">
    <div class="rest-count" id="restCount">1:30</div>
    <div class="rest-actions">
      <button data-rest="60">60s</button>
      <button data-rest="90">90s</button>
      <button data-rest="120">2m</button>
      <button id="restStop" class="rest-stop"><svg class="ico" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=45"></script>
  <script src="js/data.js?v=45"></script>
  <script src="js/icons.js?v=45"></script>
  <script src="js/app.js?v=45"></script>
  <script src="js/sync.js?v=45"></script>
</body>
</html>
